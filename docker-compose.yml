services:
  app:
    build:
      args:
        user: 'computer_shop'
        uid: 1000
      context: ./
      dockerfile: Dockerfile
    image: computer_shop
    container_name: computer_shop-app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www/:rw
    networks:
        computer_shop: {}

  db:
    image: mysql:8.4.3
    container_name: computer_shop-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    networks:
        computer_shop: {}

  nginx:
    image: nginx:alpine
    container_name: computer_shop-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/
      - ./docker-compose/nginx:/etc/nginx/conf.d
    networks:
        computer_shop: {}

  phpmyadmin:
    image: phpmyadmin
    restart: unless-stopped
    ports:
      - 8089:80
    environment:
      - PMA_HOSTS=db
      - PMA_PORT=3306
      - PMA_USER=${DB_USERNAME}
      - PMA_PASSWORD=${DB_PASSWORD}
      - PMA_ARBITRARY=1
      - UPLOAD_LIMIT=4096M
    networks:
      computer_shop: {}

  redis:
    image: 'bitnami/redis:latest'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      computer_shop: {}

networks:
  computer_shop:
    driver: bridge
    external: true
